<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Images</title>
</head>
<body>
    <h2>Upload Two Images</h2>
    <form action="upload.php" method="post" enctype="multipart/form-data">
        <label for="image1">Select Image 1:</label>
        <input type="file" name="image1" id="image1" accept="image/*" required>
        <br><br>
        <label for="image2">Select Image 2:</label>
        <input type="file" name="image2" id="image2" accept="image/*" required>
        <br><br>
        <input type="submit" value="Upload Images">
    </form>
</body>
</html>
